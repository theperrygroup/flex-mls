version: 2

updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: UTC
    target-branch: main
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    commit-message:
      prefix: chore

  - package-ecosystem: pip
    directory: /docs
    schedule:
      interval: weekly
      day: monday
      time: "05:15"
      timezone: UTC
    target-branch: main
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    commit-message:
      prefix: chore

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: UTC
    target-branch: main
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    commit-message:
      prefix: chore
