name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run test suite
        run: pytest

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          import pathlib
          import re

          root = pathlib.Path(".")
          expected_version = os.environ["GITHUB_REF_NAME"].removeprefix("v")

          version_patterns = {
              "pyproject.toml": (root / "pyproject.toml", r'^version = "([^"]+)"$'),
              "flex_mls/__init__.py": (
                  root / "flex_mls" / "__init__.py",
                  r'^__version__ = "([^"]+)"$',
              ),
              "flex_mls/base_client.py": (
                  root / "flex_mls" / "base_client.py",
                  r'^DEFAULT_USER_AGENT = "flex-mls-python-client/([^"]+)"$',
              ),
          }

          discovered_versions: dict[str, str] = {}
          for label, (path, pattern) in version_patterns.items():
              text = path.read_text(encoding="utf-8")
              match = re.search(pattern, text, re.MULTILINE)
              if match is None:
                  raise SystemExit(f"Unable to locate version in {label}.")
              discovered_versions[label] = match.group(1)

          unique_versions = set(discovered_versions.values())
          if len(unique_versions) != 1:
              versions_summary = ", ".join(
                  f"{label}={version}"
                  for label, version in discovered_versions.items()
              )
              raise SystemExit(f"Version mismatch detected: {versions_summary}")

          package_version = unique_versions.pop()
          if package_version != expected_version:
              raise SystemExit(
                  "Git tag does not match package version: "
                  f"tag={expected_version}, package={package_version}"
              )

          print(f"Validated release version {package_version}.")
          PY

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build package
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
